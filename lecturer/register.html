<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecturer Registration - Signals School LMS</title>
    <link rel="icon" type="image/jpeg" href="../logo.jpeg">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="background-carousel" data-img-path="../"></div>
    <div class="container">
        <div class="form-container">
            <div class="login-logo">
                <img src="../logo.jpeg" alt="Signals Training School Logo" class="school-logo-small">
            </div>
            <h2>Lecturer Registration</h2>
            <div id="alert-container"></div>
            <form id="registerForm" novalidate>
                <div class="form-group">
                    <label for="secretKey">Registration Key <span style="color: red;">*</span></label>
                    <input type="text" id="secretKey" name="secretKey" placeholder="Enter one-time registration key" required>
                    <small style="color: var(--text-light);">Admin must provide you with a unique registration key</small>
                </div>
                <div class="form-group">
                    <label for="rank">Rank</label>
                    <input type="text" id="rank" name="rank" placeholder="e.g., Captain, Major, Lieutenant" required>
                </div>
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="telephone">Telephone Number</label>
                    <input type="tel" id="telephone" name="telephone" placeholder="e.g., +233 XX XXX XXXX" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required minlength="6">
                        <button type="button" class="eye-toggle" onclick="togglePassword('password')" title="Show password">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" name="confirmPassword" required>
                        <button type="button" class="eye-toggle" onclick="togglePassword('confirmPassword')" title="Show password">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="subjects">Select Subjects to Teach <span style="color: red;">*</span></label>
                    <button type="button" class="btn btn-secondary" onclick="toggleSelectionModal('subjects')" style="width: 100%; text-align: left; justify-content: space-between; display: flex; align-items: center;">
                        <span id="subjects-display">Click to select subjects</span>
                        <span>▼</span>
                    </button>
                    <div id="subjectsContainer" class="checkbox-group" style="display: none;"></div>
                    <select id="subjects" name="subjects" multiple style="display: none;">
                        <option value="">-- Select Subjects --</option>
                    </select>
                    <div id="selected-subjects" style="margin-top: 10px; min-height: 20px;"></div>
                </div>
                <div class="form-group">
                    <label for="classes">Select Classes to Teach <span style="color: red;">*</span></label>
                    <button type="button" class="btn btn-secondary" onclick="toggleSelectionModal('classes')" style="width: 100%; text-align: left; justify-content: space-between; display: flex; align-items: center;">
                        <span id="classes-display">Click to select classes</span>
                        <span>▼</span>
                    </button>
                    <div id="classesContainer" class="checkbox-group" style="display: none;"></div>
                    <select id="classes" name="classes" multiple style="display: none;">
                        <option value="">-- Select Classes --</option>
                    </select>
                    <div id="selected-classes" style="margin-top: 10px; min-height: 20px;"></div>
                </div>
                
                <!-- Selection Modal -->
                <div id="selectionModal" class="modal" style="display: none;">
                    <div class="modal-content" style="max-width: 500px; max-height: 80vh; overflow-y: auto;">
                        <button class="modal-close" onclick="closeSelectionModal()">×</button>
                        <h3 id="modal-title">Select Items</h3>
                        <div id="modal-content" class="checkbox-group" style="max-height: 400px; overflow-y: auto;"></div>
                        <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end;">
                            <button type="button" class="btn btn-secondary" onclick="closeSelectionModal()">Cancel</button>
                            <button type="button" class="btn btn-primary" onclick="confirmSelection()">Confirm</button>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn" id="register-btn">Register</button>
            </form>
            <div class="link-text">
                Already have an account? <a href="login.html">Login here</a>
            </div>
            <!--<div class="link-text">
                <a href="../index.html">← Back to Portal Selection</a>
            </div>-->
        </div>
    </div>
    <script src="../js/api-service.js?v=3"></script>
    <script src="../js/app.js"></script>
    <script src="../js/lecturer-auth.js"></script>
    <script src="../js/carousel.js"></script>
</body>
</html>
