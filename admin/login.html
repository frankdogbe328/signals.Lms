<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Signals School LMS</title>
    <link rel="icon" type="image/jpeg" href="../logo.jpeg">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="background-carousel" data-img-path="../"></div>
    <div class="container">
        <div class="form-container">
            <div class="login-logo">
                <img src="../logo.jpeg" alt="Signals Training School Logo" class="school-logo-small">
            </div>
            <h2>Admin Portal Login</h2>
            <div id="alert-container"></div>
            <form id="loginForm" method="post" action="javascript:void(0);">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required>
                        <button type="button" class="eye-toggle" onclick="togglePassword('password')" title="Show password">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <!--<div class="link-text">
                <a href="../index.html">← Back to Portal Selection</a>
            </div>
            <div class="link-text" style="margin-top: 10px; font-size: 0.9rem; color: var(--text-light);">
                Default credentials: admin / admin123
            </div> -->
        </div>
    </div>
    <script src="../js/api-service.js?v=3"></script>
    <script src="../js/app.js"></script>
    <script src="../js/admin-auth.js"></script>
    <script src="../js/carousel.js"></script>
</body>
</html>
