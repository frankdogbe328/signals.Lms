<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - Signals School LMS</title>
    <link rel="icon" type="image/jpeg" href="../logo.jpeg">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="background-carousel" data-img-path="../"></div>
    <div class="container">
        <div class="form-container">
            <div class="login-logo">
                <img src="../logo.jpeg" alt="Signals Training School Logo" class="school-logo-small">
            </div>
            <h2>Student Registration</h2>
            <div id="alert-container"></div>
            <form id="registerForm">
                <div class="form-group">
                    <label for="rank">Rank</label>
                    <input type="text" id="rank" name="rank" placeholder="e.g., Private, Corporal, Sergeant" required>
                </div>
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="telephone">Telephone Number</label>
                    <input type="tel" id="telephone" name="telephone" placeholder="e.g., +233 XX XXX XXXX" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required minlength="6">
                        <button type="button" class="eye-toggle" onclick="togglePassword('password')" title="Show password">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" name="confirmPassword" required>
                        <button type="button" class="eye-toggle" onclick="togglePassword('confirmPassword')" title="Show password">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="class">Select Class</label>
                    <select id="class" name="class" required>
                        <option value="">-- Select Class --</option>
                    </select>
                </div>
                <div class="form-group" id="subjectsGroup" style="display:none;">
                    <label>Select Courses</label>
                    <small style="color:var(--text-light,#6b7280);display:block;margin-bottom:10px;">Choose the courses you are enrolled in for your class</small>
                    <div id="subjectsContainer" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
                </div>
                <button type="submit" class="btn">Register</button>
            </form>
            <div class="link-text">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>
    <script src="../js/api-service.js?v=3"></script>
    <script src="../js/app.js"></script>
    <script src="../js/student-auth.js?v=2"></script>
    <script src="../js/carousel.js"></script>
</body>
</html>
